<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مقرأة أسفار النسائية</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Tajawal',sans-serif;
background:#ece9e1;
min-height:100vh;
padding:40px 15px;
display:flex;
justify-content:center;
align-items:flex-start;
}

.container{
width:100%;
max-width:760px;
background:#f8f7f3;
border-radius:40px;
padding:40px;
box-shadow:0 20px 60px rgba(0,0,0,.08);
border:1px solid rgba(0,0,0,.05);
}

.logoBox{
text-align:center;
margin-bottom:30px;
}

.logoBox img{
width:120px;
height:auto;
margin-bottom:15px;
}

.logoBox h1{
font-size:48px;
font-weight:800;
color:#18233f;
margin-bottom:10px;
}

.logoBox p{
font-size:18px;
color:#7a7f8f;
}

.section{
background:#fcfcfb;
border:1px solid #e5e2da;
border-radius:30px;
padding:28px;
margin-bottom:28px;
}

.sectionTitle{
font-size:34px;
font-weight:800;
color:#18233f;
margin-bottom:24px;
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.field{
margin-bottom:20px;
}

.field label{
display:block;
margin-bottom:10px;
font-size:18px;
font-weight:700;
color:#1d2945;
}

input,
select,
textarea{
width:100%;
height:62px;
border-radius:20px;
border:1px solid #d9d7cf;
padding:15px;
font-size:18px;
font-family:'Tajawal',sans-serif;
background:#fff;
outline:none;
}

textarea{
height:130px;
resize:none;
padding-top:18px;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-top:20px;
}

.btn{
height:64px;
border:none;
border-radius:22px;
font-size:22px;
font-family:'Tajawal',sans-serif;
font-weight:800;
cursor:pointer;
transition:.2s;
}

.btn:hover{
transform:translateY(-2px);
}

.save{
background:#0f7a5c;
color:#fff;
}

.clear{
background:#b8862b;
color:#fff;
}

.summary{
margin-top:30px;
background:#f4f1ea;
border-radius:30px;
padding:28px;
border:1px solid #ddd7c9;
}

.summary h2{
font-size:36px;
color:#b8862b;
margin-bottom:18px;
}

.summary p{
font-size:24px;
line-height:2;
color:#1d2945;
}

@media(max-width:700px){

.container{
padding:25px;
}

.logoBox h1{
font-size:36px;
}

.sectionTitle{
font-size:28px;
}

.grid2{
grid-template-columns:1fr;
}

.buttons{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<div class="logoBox">

<img src="Asfar_logo_L@4x.png" alt="شعار أسفار">

<h1>مقرأة أسفار النسائية</h1>

<p>بوابة الرصد اليومي للمعلمة</p>

</div>

<div class="section">

<div class="sectionTitle">بيانات الطالبة</div>

<div class="field">
<label>اسم الطالبة</label>
<input type="text" id="studentName" placeholder="مثال: سارة محمد">
</div>

<div class="grid2">

<div class="field">
<label>العمر</label>
<input type="text" placeholder="مثال: 12">
</div>

<div class="field">
<label>الجنسية</label>
<input type="text" placeholder="مثال: سعودية">
</div>

</div>

</div>

<div class="section">

<div class="sectionTitle">الحفظ</div>

<div class="grid2">

<div class="field">
<label>مقدار الحفظ</label>
<select id="memorizationAmount">
<option>اختاري مقدار الحفظ</option>
<option>وجه</option>
<option>وجهان</option>
<option>ثلاثة أوجه</option>
<option>أربعة أوجه</option>
<option>خمسة أوجه</option>
</select>
</div>

<div class="field">
<label>مستوى الحفظ</label>
<select id="memorizationLevel">
<option>اختاري مستوى الحفظ</option>
<option>ممتاز</option>
<option>جيد جداً</option>
<option>جيد</option>
<option>ضعيف</option>
</select>
</div>

</div>

</div>

<div class="section">

<div class="sectionTitle">المراجعة</div>

<div class="grid2">

<div class="field">
<label>مقدار المراجعة</label>
<select id="reviewAmount">
<option>اختاري مقدار المراجعة</option>
<option>ربع جزء</option>
<option>نصف جزء</option>
<option>جزء</option>
<option>جزآن</option>
</select>
</div>

<div class="field">
<label>مستوى المراجعة</label>
<select id="reviewLevel">
<option>اختاري مستوى المراجعة</option>
<option>ممتاز</option>
<option>جيد جداً</option>
<option>جيد</option>
<option>ضعيف</option>
</select>
</div>

</div>

</div>

<div class="section">

<div class="sectionTitle">المتابعة</div>

<div class="field">
<label>الغياب</label>
<select id="absence">
<option>لا يوجد</option>
<option>غياب بعذر</option>
<option>غياب بدون عذر</option>
</select>
</div>

<div class="field">
<label>الملاحظات</label>
<textarea id="notes" placeholder="اكتبي الملاحظات"></textarea>
</div>

<div class="buttons">

<button class="btn save" onclick="saveData()">
حفظ البيانات
</button>

<button class="btn clear" onclick="clearFields()">
تفريغ الحقول
</button>

</div>

<div class="summary">

<h2>ملخص الإدخال</h2>

<p id="summaryText">

الطالبة: —<br>
الحفظ: —<br>
المراجعة: —<br>
الغياب: لا يوجد

</p>

</div>

</div>

</div>

<script>

function saveData(){

const name = document.getElementById("studentName").value;
const mem = document.getElementById("memorizationAmount").value;
const review = document.getElementById("reviewAmount").value;
const absence = document.getElementById("absence").value;

document.getElementById("summaryText").innerHTML = `
الطالبة: ${name || "—"}<br>
الحفظ: ${mem}<br>
المراجعة: ${review}<br>
الغياب: ${absence}
`;

alert("تم حفظ البيانات بنجاح");

}

function clearFields(){

document.querySelectorAll("input").forEach(el=>el.value="");
document.querySelectorAll("textarea").forEach(el=>el.value="");
document.querySelectorAll("select").forEach(el=>el.selectedIndex=0);

document.getElementById("summaryText").innerHTML = `
الطالبة: —<br>
الحفظ: —<br>
المراجعة: —<br>
الغياب: لا يوجد
`;

}

</script>

</body>
</html>
