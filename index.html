<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أسفار - بوابة المعلم</title>
    <style>
        :root { --primary-color: #bc9c64; --secondary-color: #2c3e50; --bg-color: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); padding: 20px; direction: rtl; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eef0f2; }
        .header { text-align: center; border-bottom: 2px solid var(--primary-color); padding-bottom: 15px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--secondary-color); }
        input[type="text"], select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .radio-btn { flex: 1; min-width: 120px; }
        .radio-btn input { display: none; }
        .radio-btn label { display: block; background: #fff; border: 2px solid #e0e0e0; padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .radio-btn input:checked + label { border-color: var(--primary-color); background: #fdfaf4; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        th, td { border: 1px solid #e0e0e0; padding: 8px; text-align: center; }
        th { background: #f5f6f8; }
        .btn { background: var(--primary-color); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: background 0.3s; margin-top: 15px; }
        .btn:hover { background: #a38450; }
        .alert { padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold; display: none; background: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <h2 style="margin:0; color:var(--secondary-color);">⚜️ مَركز أَسْفَار لِعُلُوم القُرآن ⚜️</h2>
            <p style="margin:5px 0 0 0; color:#666; font-size:14px;">استمارة رصد أداء الطالب اليومي (خاص بالمعلم)</p>
        </div>

        <div class="alert" id="alert-box">تم إرسال التقرير بنجاح وتحديث لوحة الإدارة فوراً!</div>

        <form id="report-form" action="https://formspree.io/f/xknadjwj" method="POST">
            <div class="form-group">
                <label>اسم الطالب ثلاثي:</label>
                <input type="text" name="اسم الطالب" required placeholder="أدخل اسم الطالب الكامل">
            </div>

            <div class="form-group">
                <label>نوع الدراسة:</label>
                <div class="radio-group">
                    <div class="radio-btn"><input type="radio" name="نوع الدراسة" id="s1" value="حضوري" checked><label for="s1">حضوري</label></div>
                    <div class="radio-btn"><input type="radio" name="نوع الدراسة" id="s2" value="عن بعد"><label for="s2">عن بعد</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>الرواية / القراءة الحالية:</label>
                <div class="radio-group">
                    <div class="radio-btn"><input type="radio" name="الرواية" id="r1" value="حفص" checked><label for="r1">حفص</label></div>
                    <div class="radio-btn"><input type="radio" name="الرواية" id="r2" value="حفص بالقصر"><label for="r2">حفص بالقصر</label></div>
                    <div class="radio-btn"><input type="radio" name="الرواية" id="r3" value="قراءة الإمام عاصم"><label for="r3">قراءة الإمام عاصم</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>الحضور والغياب اليومي:</label>
                <div class="radio-group">
                    <div class="radio-btn"><input type="radio" name="الحضور" id="a1" value="حاضر" checked><label for="a1">حاضر</label></div>
                    <div class="radio-btn"><input type="radio" name="الحضور" id="a2" value="غائب"><label for="a2">غائب</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>مقدار الحفظ الفعلي الحالي:</label>
                <select name="مقدار الحفظ">
                    <option value="جزء 30">جزء 30 (عمّ)</option>
                    <option value="جزء 29">جزء 29 (تبارك)</option>
                    <option value="أكثر من 5 أجزاء">أكثر من 5 أجزاء</option>
                    <option value="أكثر من 10 أجزاء">أكثر من 10 أجزاء</option>
                    <option value="القرآن كاملاً">القرآن كاملاً</option>
                </select>
            </div>

            <div class="form-group">
                <label>شواهد المتون العلمية المحفوظة:</label>
                <table>
                    <tr><th>المتن</th><th>نعم</th><th>لا</th><th>غير مطلوب</th></tr>
                    <tr><td>تحفة الأطفال</td><td><input type="radio" name="تحفة الأطفال" value="نعم"></td><td><input type="radio" name="تحفة الأطفال" value="لا"></td><td><input type="radio" name="تحفة الأطفال" value="غير مطلوب" checked></td></tr>
                    <tr><td>الجزرية</td><td><input type="radio" name="الجزرية" value="نعم"></td><td><input type="radio" name="الجزرية" value="لا"></td><td><input type="radio" name="الجزرية" value="غير مطلوب" checked></td></tr>
                    <tr><td>متن الشاطبية</td><td><input type="radio" name="الشاطبية" value="نعم"></td><td><input type="radio" name="الشاطبية" value="لا"></td><td><input type="radio" name="الشاطبية" value="غير مطلوب" checked></td></tr>
                </table>
            </div>

            <div class="form-group">
                <label>ملاحظات وتوجيهات الشيخ المعلم:</label>
                <textarea name="ملاحظات المعلم" rows="3" placeholder="أكتب ملاحظات الأداء هنا..."></textarea>
            </div>

            <button type="submit" class="btn" id="submit-btn">💾 حفظ وإرسال التقرير تلقائياً</button>
        </form>
    </div>
</div>

<script>
    const form = document.getElementById('report-form');
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const alertBox = document.getElementById('alert-box');
        btn.disabled = true;
        btn.innerText = "جاري الحفظ الإداري... ⏳";

        const formData = new FormData(form);
        try {
            await fetch(form.action, { method: form.method, body: formData, headers: { 'Accept': 'application/json' } });
            alertBox.style.display = 'block';
            form.reset();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (error) {
            alert("حدث خطأ أثناء الحفظ، يرجى التحقق من الاتصال.");
        } finally {
            btn.disabled = false;
            btn.innerText = "💾 حفظ وإرسال التقرير تلقائياً";
            setTimeout(() => { alertBox.style.display = 'none'; }, 4000);
        }
    });
</script>
</body>
</html>
