<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة أسفار - بوابة المعلم</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f3efe7;
font-family:'Cairo',sans-serif;
padding:15px;
color:#172233;
}

.app{
max-width:950px;
margin:auto;
}

.panel,
.teacher-reports{
background:white;
padding:24px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
margin-bottom:20px;
}

.logo{
width:100px;
display:block;
margin:auto auto 12px;
}

h1{
text-align:center;
color:#9b7332;
font-size:38px;
margin-bottom:6px;
}

.sub{
text-align:center;
color:#777;
margin-bottom:25px;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:700;
font-size:15px;
}

input,
select,
textarea{
width:100%;
padding:15px;
border-radius:16px;
border:1px solid #ddd;
font-size:15px;
font-family:'Cairo',sans-serif;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
font-size:16px;
font-weight:800;
font-family:'Cairo',sans-serif;
cursor:pointer;
margin-top:10px;
}

.btn-save{
background:#9b7332;
color:white;
}

.btn-dark{
background:#172233;
color:white;
}

.btn-clear{
background:white;
border:1px dashed #c0392b;
color:#c0392b;
}

.btn-delete{
background:#c0392b;
color:white;
padding:11px;
font-size:14px;
}

.alert{
display:none;
margin-bottom:15px;
padding:13px;
border-radius:14px;
text-align:center;
font-weight:bold;
}

.success{
background:#e8f8f1;
color:#087653;
}

.error{
background:#fdeaea;
color:#b42318;
}

.report-card{
border:1px solid #eadcc4;
border-radius:20px;
padding:16px;
margin-top:14px;
background:#fffdf8;
}

.report-card h3{
color:#9b7332;
margin-bottom:10px;
}

.row{
display:flex;
justify-content:space-between;
gap:10px;
border-bottom:1px dashed #eee;
padding:8px 0;
font-size:14px;
}

.row b{
text-align:left;
}

.small-note{
font-size:13px;
color:#777;
text-align:center;
margin-top:8px;
}

@media(max-width:768px){
h1{
font-size:28px;
}
.panel,
.teacher-reports{
padding:18px;
}
}
</style>
</head>

<body>

<div class="app">

<div class="panel">

<img src="Asfar_logo_L@4x.png" class="logo">

<h1>منصة أسفار لتعليم القرآن</h1>

<div class="sub">بوابة الرصد اليومي للمعلم</div>

<div id="alertBox" class="alert"></div>

<div class="form-group">
<label>اسم الطالب</label>
<input id="studentName" placeholder="اكتب اسم الطالب كاملًا">
</div>

<div class="form-group">
<label>الجنسية</label>
<input id="nationality" placeholder="مثال: سعودي / يمني / هندي">
</div>

<div class="form-group">
<label>نوع الدراسة</label>
<select id="studyType">
<option value="حضوري">حضوري</option>
<option value="عن بعد">عن بعد</option>
</select>
</div>

<div class="form-group">
<label>الرواية</label>
<select id="readType">
<option value="حفص">حفص</option>
<option value="حفص بالقصر">حفص بالقصر</option>
<option value="قراءة الإمام عاصم">قراءة الإمام عاصم</option>
</select>
</div>

<div class="form-group">
<label>الحضور</label>
<select id="attendance">
<option value="حاضر">حاضر</option>
<option value="غائب">غائب</option>
</select>
</div>

<div class="form-group">
<label>مقدار الحفظ / المسار</label>
<select id="hifzPart">
<option value="جزء 1">جزء 1</option>
<option value="جزء 2">جزء 2</option>
<option value="جزء 3">جزء 3</option>
<option value="جزء 4">جزء 4</option>
<option value="جزء 5">جزء 5</option>
<option value="جزء 6">جزء 6</option>
<option value="جزء 7">جزء 7</option>
<option value="جزء 8">جزء 8</option>
<option value="جزء 9">جزء 9</option>
<option value="جزء 10">جزء 10</option>
<option value="جزء 11">جزء 11</option>
<option value="جزء 12">جزء 12</option>
<option value="جزء 13">جزء 13</option>
<option value="جزء 14">جزء 14</option>
<option value="جزء 15">جزء 15</option>
<option value="جزء 16">جزء 16</option>
<option value="جزء 17">جزء 17</option>
<option value="جزء 18">جزء 18</option>
<option value="جزء 19">جزء 19</option>
<option value="جزء 20">جزء 20</option>
<option value="جزء 21">جزء 21</option>
<option value="جزء 22">جزء 22</option>
<option value="جزء 23">جزء 23</option>
<option value="جزء 24">جزء 24</option>
<option value="جزء 25">جزء 25</option>
<option value="جزء 26">جزء 26</option>
<option value="جزء 27">جزء 27</option>
<option value="جزء 28">جزء 28</option>
<option value="جزء 29">جزء 29</option>
<option value="جزء 30">جزء 30</option>
<option value="حافظ كامل">حافظ كامل</option>
<option value="ختمة إجازة">ختمة إجازة</option>
<option value="مراجعة شاملة">مراجعة شاملة</option>
<option value="القرآن كاملاً">القرآن كاملاً</option>
</select>
</div>

<div class="form-group">
<label>التحفة</label>
<select id="tohfa">
<option value="متقن">متقن</option>
<option value="متوسط">متوسط</option>
<option value="يحتاج متابعة">يحتاج متابعة</option>
<option value="غير مطلوب" selected>غير مطلوب</option>
</select>
</div>

<div class="form-group">
<label>الجزرية</label>
<select id="jazariya">
<option value="متقن">متقن</option>
<option value="متوسط">متوسط</option>
<option value="يحتاج متابعة">يحتاج متابعة</option>
<option value="غير مطلوب" selected>غير مطلوب</option>
</select>
</div>

<div class="form-group">
<label>معاني الكلمات</label>
<select id="maani">
<option value="متقن">متقن</option>
<option value="متوسط">متوسط</option>
<option value="يحتاج متابعة">يحتاج متابعة</option>
<option value="غير مطلوب" selected>غير مطلوب</option>
</select>
</div>

<div class="form-group">
<label>الشواهد</label>
<select id="shatibiya">
<option value="متقن">متقن</option>
<option value="متوسط">متوسط</option>
<option value="يحتاج متابعة">يحتاج متابعة</option>
<option value="غير مطلوب" selected>غير مطلوب</option>
</select>
</div>

<div class="form-group">
<label>الملاحظات التعليمية</label>
<textarea id="notes" rows="3" placeholder="اكتب ملاحظة المعلم هنا..."></textarea>
</div>

<button id="saveBtn" class="btn btn-save" onclick="sendReport()">💾 حفظ وإرسال التقرير</button>

<button class="btn btn-dark" onclick="loadStudentReports()">📄 عرض تقارير الطالب</button>

<button class="btn btn-clear" onclick="clearForm()">مسح الحقول</button>

</div>

<div class="teacher-reports">

<h2 style="color:#9b7332;text-align:center;margin-bottom:10px">
تقارير الطالب للمعلم
</h2>

<div id="teacherReportsBox" style="color:#777;text-align:center">
اكتب اسم الطالب ثم اضغط: عرض تقارير الطالب
</div>

<div class="small-note">
يمكن حذف الرصد الخاطئ من هنا بعد عرضه.
</div>

</div>

</div>

<script>
const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbz8Uoo-NKHXyx66pGp_I4k3VXaFN3zU42UZRz9VTDRFjZSx82LW72Nrh-RFyWMeGyEtYA/exec";

function showAlert(msg,type){
const box=document.getElementById("alertBox");
box.className="alert "+type;
box.textContent=msg;
box.style.display="block";
setTimeout(()=>{
box.style.display="none";
},4000);
}

function sendReport(){

const btn=document.getElementById("saveBtn");

const studentName=
document.getElementById("studentName").value.trim();

if(!studentName){
showAlert("يرجى كتابة اسم الطالب","error");
return;
}

const params=new URLSearchParams({
action:"insert",
studentName:studentName,
nationality:document.getElementById("nationality").value.trim(),
studyType:document.getElementById("studyType").value,
readType:document.getElementById("readType").value,
attendance:document.getElementById("attendance").value,
hifzPart:document.getElementById("hifzPart").value,
tohfa:document.getElementById("tohfa").value,
jazariya:document.getElementById("jazariya").value,
maani:document.getElementById("maani").value,
shatibiya:document.getElementById("shatibiya").value,
notes:document.getElementById("notes").value.trim()
});

btn.disabled=true;
btn.textContent="جاري الحفظ والإرسال...";

const img=new Image();

img.onload=img.onerror=function(){
showAlert("تم إرسال التقرير بنجاح ✅","success");
btn.disabled=false;
btn.textContent="💾 حفظ وإرسال التقرير";
document.getElementById("notes").value="";
loadStudentReports();
};

img.src=SCRIPT_URL+"?"+params.toString();

}

async function loadStudentReports(){

const name=
document.getElementById("studentName").value.trim();

if(!name){
showAlert("اكتب اسم الطالب أولًا","error");
return;
}

const box=document.getElementById("teacherReportsBox");

box.innerHTML="جاري تحميل التقارير...";

try{

const res=await fetch(SCRIPT_URL);

const allReports=await res.json();

const data=
allReports.filter(r=>r.studentName===name);

if(!data.length){
box.innerHTML="لا توجد تقارير لهذا الطالب.";
return;
}

const latest=data[data.length-1];

box.innerHTML=`

<div class="report-card">
<h3>${name}</h3>

<div class="row">
<span>عدد التقارير</span>
<b>${data.length}</b>
</div>

<div class="row">
<span>آخر حفظ / مسار</span>
<b>${latest.hifzPart || "-"}</b>
</div>

<div class="row">
<span>الرواية</span>
<b>${latest.readType || "-"}</b>
</div>

<div class="row">
<span>آخر ملاحظة</span>
<b>${latest.notes || "لا توجد"}</b>
</div>
</div>

<h3 style="margin-top:18px;color:#9b7332;text-align:right">
آخر التقارير
</h3>

${data.slice().reverse().map((r,index)=>`
<div class="report-card">

<h3>رصد ${data.length-index}</h3>

<div class="row">
<span>الحضور</span>
<b>${r.attendance || "-"}</b>
</div>

<div class="row">
<span>الحفظ / المسار</span>
<b>${r.hifzPart || "-"}</b>
</div>

<div class="row">
<span>التحفة</span>
<b>${r.tohfa || "-"}</b>
</div>

<div class="row">
<span>الجزرية</span>
<b>${r.jazariya || "-"}</b>
</div>

<div class="row">
<span>معاني الكلمات</span>
<b>${r.maani || "-"}</b>
</div>

<div class="row">
<span>الشواهد</span>
<b>${r.shatibiya || "-"}</b>
</div>

<div class="row">
<span>الملاحظات</span>
<b>${r.notes || "لا توجد"}</b>
</div>

<button class="btn btn-delete" onclick="deleteReport('${r.rowNumber}', '${name}')">
🗑️ حذف هذا الرصد
</button>

</div>
`).join("")}
`;

}catch(e){

box.innerHTML="تعذر تحميل التقارير.";

}

}

function deleteReport(rowNumber, studentName){

if(!rowNumber || rowNumber==="undefined"){
showAlert("لا يمكن حذف هذا الرصد؛ رقم الصف غير موجود","error");
return;
}

const ok=confirm("هل أنت متأكد من حذف هذا الرصد؟ لا يمكن التراجع بعد الحذف.");

if(!ok){
return;
}

const params=new URLSearchParams({
action:"delete",
rowNumber:rowNumber
});

const img=new Image();

img.onload=img.onerror=function(){
showAlert("تم حذف الرصد بنجاح ✅","success");
loadStudentReports();
};

img.src=SCRIPT_URL+"?"+params.toString();

}

function clearForm(){
document.getElementById("studentName").value="";
document.getElementById("nationality").value="";
document.getElementById("notes").value="";
document.getElementById("teacherReportsBox").innerHTML=
"اكتب اسم الطالب ثم اضغط: عرض تقارير الطالب";
}
</script>

</body>
</html>
