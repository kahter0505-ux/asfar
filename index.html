<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/ضع_هنا_الرابط_الجديد/exec";


document.getElementById('report-form')
.addEventListener('submit', async function(e) {

    e.preventDefault();

    const btn =
      document.getElementById('submit-btn');

    btn.disabled = true;

    btn.innerText =
      "جاري الحفظ والإرسال... ⏳";

    try {

        let activeTexts = [];

        if(document.querySelector('input[name="tohfa"]:checked')?.value === "نعم") {
            activeTexts.push("تحفة الأطفال");
        }

        if(document.querySelector('input[name="jazariya"]:checked')?.value === "نعم") {
            activeTexts.push("الجزرية");
        }

        if(document.querySelector('input[name="shatibiya"]:checked')?.value === "نعم") {
            activeTexts.push("الشاطبية");
        }

        const today = new Date();

        const payload = {

            date:
              today.getFullYear() + '/' +
              (today.getMonth()+1) + '/' +
              today.getDate(),

            studentName:
              document.getElementById('student-name').value.trim(),

            studyType:
              document.querySelector('input[name="study-type"]:checked').value,

            readType:
              document.querySelector('input[name="read-type"]:checked').value,

            attendance:
              document.querySelector('input[name="attendance"]:checked').value,

            hifzPart:
              document.getElementById('hifz-part').value,

            texts:
              activeTexts.length > 0
              ? activeTexts.join(' و ')
              : "لا يوجد",

            notes:
              document.getElementById('teacher-notes').value
              || "لا توجد ملاحظات."

        };



        const formData = new FormData();

        for (const key in payload) {

            formData.append(key, payload[key]);

        }



        const response = await fetch(SCRIPT_URL, {

            method: 'POST',

            body: formData

        });



        const data = await response.json();



        if(data.status === "success") {

            const alertBox =
              document.getElementById('alert-box');

            alertBox.style.display = 'block';

            document.getElementById('report-form')
              .reset();

            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });

            setTimeout(() => {

                alertBox.style.display = 'none';

            }, 4000);

        } else {

            alert("فشل حفظ البيانات");

        }

    } catch(error) {

        console.error(error);

        alert("حدث خطأ أثناء الإرسال");

    } finally {

        btn.disabled = false;

        btn.innerText =
          "💾 حفظ وإرسال التقرير";

    }

});

</script>
