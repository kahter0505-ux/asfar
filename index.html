<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة أسفار - بوابة المعلم</title>

<style>
body{margin:0;padding:14px;background:#f3efe7;font-family:Tahoma,Arial,sans-serif;color:#172233}
.app{max-width:850px;margin:auto}
.panel{background:white;padding:24px;border-radius:24px;box-shadow:0 10px 25px rgba(0,0,0,.07)}
h1{text-align:center;color:#9b7332;margin:0 0 8px}
.sub{text-align:center;color:#777;margin-bottom:25px}
.form-group{margin-bottom:18px}
label{display:block;margin-bottom:8px;font-weight:bold}
input,select,textarea{width:100%;padding:14px;border-radius:14px;border:1px solid #ddd;box-sizing:border-box;font-size:15px}
.options{display:flex;flex-wrap:wrap;gap:10px}
.option{padding:10px 16px;border-radius:14px;border:1px solid #ddd;background:#fff;cursor:pointer}
.option input{width:auto;margin-left:6px}
.btn{width:100%;padding:15px;border:none;border-radius:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:10px}
.btn-save{background:#9b7332;color:white}
.btn-clear{background:white;border:1px dashed #c0392b;color:#c0392b}
.alert{display:none;margin-bottom:15px;padding:13px;border-radius:14px;text-align:center;font-weight:bold}
.success{background:#e8f8f1;color:#087653}
.error{background:#fdeaea;color:#b42318}
</style>
</head>

<body>

<div class="app">
<div class="panel">

<h1>منصة أسفار لتعليم القرآن</h1>
<div class="sub">بوابة الرصد اليومي للمعلم</div>

<div id="alertBox" class="alert"></div>

<div class="form-group">
<label>اسم الطالب</label>
<input id="studentName" placeholder="اكتب اسم الطالب كاملًا">
</div>

<div class="form-group">
<label>الجنسية</label>
<input id="nationality" placeholder="مثال: سعودي / يمني / هندي">
</div>

<div class="form-group">
<label>نوع الدراسة</label>
<div class="options">
<label class="option"><input type="radio" name="studyType" value="حضوري" checked>حضوري</label>
<label class="option"><input type="radio" name="studyType" value="عن بعد">عن بعد</label>
</div>
</div>

<div class="form-group">
<label>الرواية</label>
<div class="options">
<label class="option"><input type="radio" name="readType" value="حفص" checked>حفص</label>
<label class="option"><input type="radio" name="readType" value="حفص بالقصر">حفص بالقصر</label>
<label class="option"><input type="radio" name="readType" value="قراءة الإمام عاصم">قراءة الإمام عاصم</label>
</div>
</div>

<div class="form-group">
<label>الحضور</label>
<div class="options">
<label class="option"><input type="radio" name="attendance" value="حاضر" checked>حاضر</label>
<label class="option"><input type="radio" name="attendance" value="غائب">غائب</label>
</div>
</div>

<div class="form-group">
<label>مقدار الحفظ</label>
<select id="hifzPart"></select>
</div>

<div class="form-group">
<label>التحفة</label>
<div class="options">
<label class="option"><input type="radio" name="tohfa" value="نعم">نعم</label>
<label class="option"><input type="radio" name="tohfa" value="لا" checked>لا</label>
</div>
</div>

<div class="form-group">
<label>الجزرية</label>
<div class="options">
<label class="option"><input type="radio" name="jazariya" value="نعم">نعم</label>
<label class="option"><input type="radio" name="jazariya" value="لا" checked>لا</label>
</div>
</div>

<div class="form-group">
<label>معاني الكلمات</label>
<div class="options">
<label class="option"><input type="radio" name="maani" value="متقن">متقن</label>
<label class="option"><input type="radio" name="maani" value="متوسط" checked>متوسط</label>
<label class="option"><input type="radio" name="maani" value="غير متقن">غير متقن</label>
</div>
</div>

<div class="form-group">
<label>الشواهد</label>
<div class="options">
<label class="option"><input type="radio" name="shatibiya" value="متقن">متقن</label>
<label class="option"><input type="radio" name="shatibiya" value="متوسط">متوسط</label>
<label class="option"><input type="radio" name="shatibiya" value="غير متقن">غير متقن</label>
<label class="option"><input type="radio" name="shatibiya" value="غير مطلوب" checked>غير مطلوب</label>
</div>
</div>

<div class="form-group">
<label>الملاحظات التعليمية</label>
<textarea id="notes" rows="3" placeholder="اكتب ملاحظة المعلم هنا..."></textarea>
</div>

<button id="saveBtn" class="btn btn-save" onclick="sendReport()">💾 حفظ وإرسال التقرير</button>
<button class="btn btn-clear" onclick="clearForm()">مسح الحقول</button>

</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzNoX-3haqS2WS0F4SxwFR2uC1SKpP45z5SJTYYAwfacLSOe_RZo0pYxtoTNxYWJQm9-g/exec";

window.onload = function(){
  const hifz = document.getElementById("hifzPart");
  for(let i=1;i<=30;i++){
    let op=document.createElement("option");
    op.value=i;
    op.textContent="جزء "+i;
    hifz.appendChild(op);
  }
};

function radio(name){
  return document.querySelector(`input[name="${name}"]:checked`).value;
}

function showAlert(msg,type){
  const box=document.getElementById("alertBox");
  box.className="alert "+type;
  box.textContent=msg;
  box.style.display="block";
  setTimeout(()=>box.style.display="none",4000);
}

function sendReport(){

  const btn=document.getElementById("saveBtn");
  const studentName=document.getElementById("studentName").value.trim();

  if(!studentName){
    showAlert("يرجى كتابة اسم الطالب","error");
    return;
  }

  const params = new URLSearchParams({
    action:"insert",
    studentName: studentName,
    nationality: document.getElementById("nationality").value.trim(),
    studyType: radio("studyType"),
    readType: radio("readType"),
    attendance: radio("attendance"),
    hifzPart: document.getElementById("hifzPart").value,
    tohfa: radio("tohfa"),
    jazariya: radio("jazariya"),
    maani: radio("maani"),
    shatibiya: radio("shatibiya"),
    notes: document.getElementById("notes").value.trim()
  });

  btn.disabled=true;
  btn.textContent="جاري الحفظ والإرسال...";

  const img = new Image();

  img.onload = img.onerror = function(){
    showAlert("تم إرسال التقرير بنجاح ✅","success");
    document.getElementById("notes").value="";
    btn.disabled=false;
    btn.textContent="💾 حفظ وإرسال التقرير";
  };

  img.src = SCRIPT_URL + "?" + params.toString();
}

function clearForm(){
  document.getElementById("studentName").value="";
  document.getElementById("nationality").value="";
  document.getElementById("notes").value="";
}
</script>

</body>
</html>
