<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المسؤولين - أسفار</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cairo',sans-serif;
background:#f5f1ea;
padding:20px;
color:#2b2b2b;
}

.container{
max-width:1200px;
margin:auto;
}

.header{
background:#fff;
border-radius:30px;
padding:40px 30px;
text-align:center;
margin-bottom:25px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.logo{
width:140px;
margin-bottom:20px;
}

.title{
font-size:52px;
font-weight:800;
color:#a77b2d;
margin-bottom:10px;
}

.subtitle{
font-size:24px;
color:#7d7d7d;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#efe7d8;
padding:35px;
border-radius:25px;
text-align:center;
}

.card h2{
font-size:55px;
color:#a77b2d;
margin-bottom:10px;
}

.card p{
font-size:22px;
font-weight:700;
}

.search-box{
background:#fff;
padding:25px;
border-radius:25px;
margin-bottom:25px;
}

.search-box input{
width:100%;
padding:18px;
border-radius:18px;
border:1px solid #ddd;
font-size:20px;
font-family:'Cairo',sans-serif;
}

.students{
display:flex;
flex-direction:column;
gap:25px;
}

.student-card{
background:#fff;
padding:30px;
border-radius:30px;
box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.student-name{
font-size:40px;
font-weight:800;
color:#a77b2d;
margin-bottom:20px;
}

.row{
display:flex;
justify-content:space-between;
padding:14px 0;
border-bottom:1px dashed #ddd;
font-size:22px;
}

.row:last-child{
border:none;
}

.report-btn{
width:100%;
padding:20px;
border:none;
border-radius:18px;
background:#a77b2d;
color:#fff;
font-size:22px;
font-family:'Cairo',sans-serif;
font-weight:700;
margin-top:20px;
cursor:pointer;
}

.modal{
position:fixed;
top:0;
right:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:9999;
}

.modal-content{
background:#fff;
width:100%;
max-width:700px;
border-radius:30px;
padding:40px;
max-height:90vh;
overflow:auto;
}

.close{
font-size:35px;
cursor:pointer;
margin-bottom:20px;
display:block;
}

.report-title{
font-size:40px;
font-weight:800;
color:#a77b2d;
margin-bottom:25px;
text-align:center;
}

.report-row{
padding:16px 0;
border-bottom:1px dashed #ddd;
font-size:22px;
display:flex;
justify-content:space-between;
}

@media(max-width:768px){

.title{
font-size:36px;
}

.subtitle{
font-size:18px;
}

.student-name{
font-size:28px;
}

.row,
.report-row{
font-size:18px;
}

.card h2{
font-size:38px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">

<img src="Asfar_logo_L@4x.png" class="logo">

<div class="title">
منصة أسفار لتعليم القرآن
</div>

<div class="subtitle">
لوحة المسؤولين لمتابعة التقارير التراكمية
</div>

</div>

<div class="stats">

<div class="card">
<h2 id="studentsCount">0</h2>
<p>عدد الطلاب</p>
</div>

<div class="card">
<h2 id="reportsCount">0</h2>
<p>عدد التقارير</p>
</div>

<div class="card">
<h2 id="nationalitiesCount">0</h2>
<p>عدد الجنسيات</p>
</div>

<div class="card">
<h2 id="attendanceAvg">0%</h2>
<p>متوسط الحضور</p>
</div>

</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="ابحث باسم الطالب أو الجنسية...">
</div>

<div class="students" id="studentsContainer"></div>

</div>

<div class="modal" id="reportModal">

<div class="modal-content">

<span class="close" onclick="closeModal()">✕</span>

<div class="report-title" id="reportTitle"></div>

<div id="reportContent"></div>

</div>

</div>

<script>

const SHEET_URL = "https://script.google.com/macros/s/AKfycbzNoX-3haqS2WS0F4SxwFR2uC1SKpP45z5SJTYYAwfacLSOe_RZo0pYxtoTNxYWJQm9-g/exec";

let reports = [];

async function loadData(){

try{

const response = await fetch(SHEET_URL);
const data = await response.json();

reports = data.reverse();

renderStats();
renderStudents(reports);

}catch(error){

console.log(error);

}

}

function renderStats(){

const students = [...new Set(reports.map(r => r.studentName))];
const nationalities = [...new Set(reports.map(r => r.nationality))];

document.getElementById("studentsCount").innerText = students.length;
document.getElementById("reportsCount").innerText = reports.length;
document.getElementById("nationalitiesCount").innerText = nationalities.length;

const attendanceCount = reports.filter(r => r.attendance === "حاضر").length;

const avg = reports.length
? Math.round((attendanceCount / reports.length) * 100)
: 0;

document.getElementById("attendanceAvg").innerText = avg + "%";

}

function renderStudents(data){

const container = document.getElementById("studentsContainer");

container.innerHTML = "";

const grouped = {};

data.forEach(r => {

if(!grouped[r.studentName]){
grouped[r.studentName] = [];
}

grouped[r.studentName].push(r);

});

Object.keys(grouped).forEach(name => {

const latest = grouped[name][0];

container.innerHTML += `

<div class="student-card">

<div class="student-name">${name}</div>

<div class="row">
<span>الجنسية</span>
<span>${latest.nationality}</span>
</div>

<div class="row">
<span>الدراسة</span>
<span>${latest.studyType}</span>
</div>

<div class="row">
<span>الحفظ</span>
<span>${latest.hifzPart}</span>
</div>

<div class="row">
<span>الحضور</span>
<span>${latest.attendance}</span>
</div>

<button class="report-btn" onclick="showReport('${name}')">
عرض التقرير
</button>

</div>

`;

});

}

function showReport(name){

const studentReports = reports.filter(r => r.studentName === name);

document.getElementById("reportTitle").innerText = name;

let html = "";

studentReports.forEach(r => {

html += `

<div class="report-row">
<span>التاريخ</span>
<span>${r.date}</span>
</div>

<div class="report-row">
<span>الجنسية</span>
<span>${r.nationality}</span>
</div>

<div class="report-row">
<span>نوع الدراسة</span>
<span>${r.studyType}</span>
</div>

<div class="report-row">
<span>الرواية</span>
<span>${r.readType}</span>
</div>

<div class="report-row">
<span>الحضور</span>
<span>${r.attendance}</span>
</div>

<div class="report-row">
<span>الحفظ</span>
<span>${r.hifzPart}</span>
</div>

<div class="report-row">
<span>التحفة</span>
<span>${r.tohfa}</span>
</div>

<div class="report-row">
<span>الجزرية</span>
<span>${r.jazaria}</span>
</div>

<div class="report-row">
<span>معاني الكلمات</span>
<span>${r.meanings}</span>
</div>

<div class="report-row">
<span>الشواهد</span>
<span>${r.shawahid}</span>
</div>

<div class="report-row">
<span>الملاحظات</span>
<span>${r.notes}</span>
</div>

<hr style="margin:25px 0;border:none;border-top:2px dashed #ddd;">

`;

});

document.getElementById("reportContent").innerHTML = html;

document.getElementById("reportModal").style.display = "flex";

}

function closeModal(){

document.getElementById("reportModal").style.display = "none";

}

document.getElementById("searchInput").addEventListener("input", function(){

const value = this.value.trim();

const filtered = reports.filter(r => 
r.studentName.includes(value) ||
r.nationality.includes(value)
);

renderStudents(filtered);

});

loadData();

</script>

</body>
</html>
