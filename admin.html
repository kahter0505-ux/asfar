<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/ضع_هنا_الرابط_الجديد/exec";



async function loadReports() {

    try {

        const response =
          await fetch(SCRIPT_URL);

        const reports =
          await response.json();

        const tableBody =
          document.getElementById('table-body');

        tableBody.innerHTML = "";



        reports.forEach(report => {

            const row = `
            <tr>
                <td>${report.date}</td>
                <td>${report.studentName}</td>
                <td>${report.studyType}</td>
                <td>${report.readType}</td>
                <td>${report.attendance}</td>
                <td>${report.hifzPart}</td>
                <td>${report.texts}</td>
                <td>${report.notes}</td>
            </tr>
            `;

            tableBody.innerHTML += row;

        });

    } catch(error) {

        console.error(error);

        alert("فشل تحميل البيانات");

    }

}



loadReports();

</script>
