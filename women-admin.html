<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المسؤولات - قسم النساء</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'Cairo',sans-serif;
background:#f5f1ea;
color:#172233;
padding:18px
}

.container{max-width:1200px;margin:auto}

.header{
background:white;
border-radius:32px;
padding:42px 25px;
text-align:center;
margin-bottom:22px;
box-shadow:0 10px 30px rgba(0,0,0,.05)
}

.logo{width:180px;height:180px;object-fit:contain}

.header h1{color:#a77b2d;font-size:42px;font-weight:800}
.header p{color:#777;font-size:18px}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:16px;
margin-bottom:22px
}

.stat{
background:#fff7e8;
border:1px solid #e7dcc7;
border-radius:22px;
padding:22px;
text-align:center
}

.stat strong{display:block;font-size:34px;color:#a77b2d}

.search-box{
background:white;
border-radius:24px;
padding:18px;
margin-bottom:22px
}

.search-box input{
width:100%;
padding:16px;
border:1px solid #ddd;
border-radius:16px;
font-size:17px;
font-family:'Cairo'
}

.students{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(270px,1fr));
gap:18px
}

.card{
background:white;
border:1px solid #e7dcc7;
border-radius:24px;
padding:22px
}

.card h2{color:#a77b2d;font-size:28px;margin-bottom:12px}

.row{
display:flex;
justify-content:space-between;
border-bottom:1px dashed #eee;
padding:9px 0;
font-size:15px
}

.btn{
width:100%;
border:0;
border-radius:15px;
padding:14px;
margin-top:15px;
background:#a77b2d;
color:white;
font-family:'Cairo';
font-weight:800;
font-size:16px
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.62);
z-index:999;
overflow:auto;
padding:18px
}

.profile{
max-width:980px;
margin:auto;
background:#fffdf8;
border:7px solid #c8a45d;
border-radius:28px;
padding:24px
}

.close{
background:#b42318;
color:white;
border:0;
border-radius:12px;
padding:10px 18px;
font-family:'Cairo';
font-weight:800;
margin-bottom:12px
}

.profile-header{
text-align:center;
border-bottom:2px solid #c8a45d;
padding-bottom:14px;
margin-bottom:18px
}

.profile-header img{width:150px;height:150px;object-fit:contain}
.profile-header h2{color:#a77b2d;font-size:36px}

.section{
background:white;
border:1px solid #e7dcc7;
border-radius:20px;
padding:18px;
margin-bottom:16px
}

.section h3{
color:#a77b2d;
margin-bottom:12px;
border-bottom:1px solid #c8a45d;
padding-bottom:7px
}

.day{
background:#fffaf2;
border:1px solid #eadcc4;
border-radius:16px;
padding:12px;
margin-bottom:10px
}

@media(max-width:768px){
.header h1{font-size:30px}
.logo{width:140px;height:140px}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="Asfar_logo_L@4x.png" class="logo">
<h1>مقرأة أسفار النسائية</h1>
<p>لوحة المسؤولات - قسم النساء</p>
</div>

<div class="stats">
<div class="stat"><strong id="studentsCount">0</strong><span>عدد الطالبات</span></div>
<div class="stat"><strong id="reportsCount">0</strong><span>عدد التقارير</span></div>
<div class="stat"><strong id="attendanceAvg">0%</strong><span>متوسط الالتزام</span></div>
<div class="stat"><strong id="nationalitiesCount">0</strong><span>عدد الجنسيات</span></div>
</div>

<div class="search-box">
<input id="searchInput" placeholder="ابحثي باسم الطالبة أو الجنسية..." oninput="renderCards()">
</div>

<div id="studentsContainer" class="students">جاري تحميل البيانات...</div>

</div>

<div id="profileModal" class="modal">
<div class="profile">

<button class="close" onclick="closeProfile()">إغلاق</button>

<div class="profile-header">
<img src="Asfar_logo_L@4x.png">
<h2 id="profileName">اسم الطالبة</h2>
<p>الملف التراكمي للطالبة</p>
</div>

<div class="section">
<h3>الملخص</h3>
<div id="summaryBox"></div>
</div>

<div class="section">
<h3>التقييم</h3>
<div id="evalBox"></div>
</div>

<div class="section">
<h3>السجل الزمني</h3>
<div id="timeline"></div>
</div>

<div class="section">
<h3>الملاحظات</h3>
<div id="notesOnly"></div>
</div>

</div>
</div>

<script>
const WOMEN_URL =
"https://script.google.com/macros/s/AKfycbyebv8qSiWiF2HF0aLtgkeEWcBGHiCFPg2bTnZ0u0zTCCCMIQuWgM7C5_MvdWvhD7yD/exec";
let reports = [];
let grouped = {};

loadData();

async function loadData(){
try{
const res = await fetch(WOMEN_URL);
reports = await res.json();
reports = reports.filter(r=>r.studentName);
groupData();
renderStats();
renderCards();
}catch(e){
studentsContainer.innerHTML = "تعذر تحميل البيانات.";
}
}

function groupData(){
grouped = {};
reports.forEach(r=>{
const name = String(r.studentName || "").trim();
if(!grouped[name]){
grouped[name] = [];
}
grouped[name].push(r);
});
}

function normalizeText(t){
return String(t||"")
.replace(/[أإآ]/g,"ا")
.replace(/ة/g,"ه")
.replace(/ى/g,"ي")
.trim()
.toLowerCase();
}

function renderStats(){
const names = Object.keys(grouped);
studentsCount.textContent = names.length;
reportsCount.textContent = reports.length;

const attend = reports.filter(r=>String(r.absence||"") === "لا يوجد").length;

attendanceAvg.textContent =
reports.length ? Math.round(attend/reports.length*100)+"%" : "0%";

const nationalities = [...new Set(
reports.map(r=>String(r.nationality||"").trim()).filter(Boolean)
)];

nationalitiesCount.textContent = nationalities.length;
}

function renderCards(){
const q = normalizeText(searchInput.value);

const names = Object.keys(grouped).filter(name=>{
const latest = grouped[name][grouped[name].length-1];

return !q ||
normalizeText(name).includes(q) ||
normalizeText(latest.nationality).includes(q) ||
normalizeText(latest.memorizationAmount).includes(q);
});

if(!names.length){
studentsContainer.innerHTML = "لا توجد نتائج.";
return;
}

studentsContainer.innerHTML = names.map(name=>{
const db = grouped[name];
const latest = db[db.length-1];

const attend = db.filter(x=>String(x.absence||"")==="لا يوجد").length;
const pct = Math.round(attend/db.length*100);

return `
<div class="card">
<h2>${name}</h2>

<div class="row"><span>الجنسية</span><b>${latest.nationality||"-"}</b></div>
<div class="row"><span>العمر</span><b>${latest.age||"-"}</b></div>
<div class="row"><span>آخر حفظ</span><b>${latest.memorizationAmount||"-"}</b></div>
<div class="row"><span>عدد التقارير</span><b>${db.length}</b></div>
<div class="row"><span>الالتزام</span><b>${pct}%</b></div>

<button class="btn" onclick="openProfile('${name.replace(/'/g,"")}')">عرض الملف</button>
</div>
`;
}).join("");
}

function openProfile(name){
const db = grouped[name];
const latest = db[db.length-1];

profileName.textContent = name;

summaryBox.innerHTML = `
<div class="row"><span>العمر</span><b>${latest.age||"-"}</b></div>
<div class="row"><span>الجنسية</span><b>${latest.nationality||"-"}</b></div>
<div class="row"><span>الحفظ</span><b>${latest.memorizationAmount||"-"}</b></div>
<div class="row"><span>المراجعة</span><b>${latest.reviewAmount||"-"}</b></div>
`;

evalBox.innerHTML = `
<div class="row"><span>مستوى الحفظ</span><b>${latest.memorizationLevel||"-"}</b></div>
<div class="row"><span>مستوى المراجعة</span><b>${latest.reviewLevel||"-"}</b></div>
<div class="row"><span>الغياب</span><b>${latest.absence||"-"}</b></div>
`;

timeline.innerHTML = db.slice().reverse().map((r,i)=>`
<div class="day">
<b>رصد ${db.length-i}</b>
<div class="row"><span>الحفظ</span><b>${r.memorizationAmount||"-"}</b></div>
<div class="row"><span>المراجعة</span><b>${r.reviewAmount||"-"}</b></div>
<div class="row"><span>الغياب</span><b>${r.absence||"-"}</b></div>
</div>
`).join("");

notesOnly.innerHTML = db.slice().reverse().map((r,i)=>`
<div class="day">
<b>ملاحظة ${db.length-i}</b>
<div>${r.notes || "لا توجد ملاحظات."}</div>
</div>
`).join("");

profileModal.style.display = "block";
}

function closeProfile(){
profileModal.style.display = "none";
}
</script>

</body>
</html>
